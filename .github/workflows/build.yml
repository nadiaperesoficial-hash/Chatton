name: Build APK

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          
      - name: Create google-services.json
        run: |
          mkdir -p android/app
          echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          
      - name: Install dependencies
        run: flutter pub get
        
      - name: Build APK
        # A flag --android-skip-build-dependency-validation ignora o erro de versão do Gradle 
        # detectado pelo plugin do Flutter, permitindo o prosseguimento do build.
        run: flutter build apk --debug --android-skip-build-dependency-validation
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
